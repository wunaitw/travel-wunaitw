<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>旅遊特搜 | travel.wunaitw.com</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#EEF6FF;--cloud:#FFF;--sun:#FFD93D;--sun-dk:#E6A800;
  --coral:#FF6B6B;--coral-dk:#C0392B;--coral-lt:#FFF0F0;
  --ocean:#3AAEDC;--ocean-lt:#E3F6FF;--ocean-dk:#1a7fa8;
  --grass:#52B788;--grass-dk:#2D6A4F;--mint-lt:#E3FAF8;
  --peach:#FF9A3C;--peach-lt:#FFF3E8;
  --lav:#9B72CF;--lav-lt:#F3ECFF;
  --text:#222;--muted:#8A8A9A;--border:rgba(0,0,0,.07);
  --r:18px;--rsm:12px;--rxs:8px
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:"Noto Sans TC",sans-serif;background:var(--sky);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:32px;overflow-x:hidden}

/* Header */
.hdr{background:var(--cloud);padding:13px 16px 11px;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--sun)}
.rainbow{height:4px;background:linear-gradient(90deg,#FF6B6B,#FFD93D 25%,#6BCB77 50%,#4CC9F0 75%,#C77DFF);border-radius:2px;margin-bottom:11px}
.hdr-row{display:flex;align-items:center;gap:10px}
.logo-ball{width:52px;height:52px;border-radius:50%;overflow:hidden;flex-shrink:0;animation:wobble 4s ease-in-out infinite}
.logo-ball img{width:100%;height:100%;object-fit:contain;display:block}
@keyframes wobble{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
.hdr-titles{flex:1}
.app-name{font-family:"Nunito",sans-serif;font-size:17px;font-weight:900;color:var(--coral);line-height:1.1}
.app-name b{color:var(--ocean)}
.app-sub{font-size:10px;color:var(--muted);font-family:"Nunito",sans-serif;font-weight:700;margin-top:1px}

/* Hero */
.hero{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);padding:22px 16px 18px;position:relative;overflow:hidden}
.hero-bg{position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(255,107,107,.3),transparent 70%);pointer-events:none}
.hero-bg2{position:absolute;bottom:-30px;left:-30px;width:150px;height:150px;background:radial-gradient(circle,rgba(58,174,220,.2),transparent 70%);pointer-events:none}
.hero-tag{display:inline-block;background:rgba(255,215,61,.2);color:var(--sun);border:1.5px solid rgba(255,215,61,.4);border-radius:999px;padding:4px 12px;font-size:10px;font-family:"Nunito",sans-serif;font-weight:900;letter-spacing:.5px;margin-bottom:10px}
.hero-title{font-family:"Nunito",sans-serif;font-size:22px;font-weight:900;color:#fff;line-height:1.25;margin-bottom:6px}
.hero-title span{color:var(--sun)}
.hero-desc{font-size:12px;color:rgba(255,255,255,.65);line-height:1.7}

/* Filter Panel */
.fpanel{background:var(--cloud);margin:12px 12px 0;border-radius:var(--r);padding:14px;border:2px solid var(--border);box-shadow:0 4px 0 rgba(0,0,0,.05)}
.fsec{margin-bottom:13px}.fsec:last-child{margin-bottom:0}
.ftitle{font-family:"Nunito",sans-serif;font-size:11px;font-weight:900;letter-spacing:.5px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:5px;text-transform:uppercase}
.fdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 13px;border-radius:999px;font-size:12px;font-weight:800;font-family:"Nunito",sans-serif;border:2px solid var(--border);background:var(--sky);color:var(--muted);cursor:pointer;white-space:nowrap;user-select:none;transition:all .15s}
.chip:active{transform:scale(.93)}
.chip.on{color:#fff}
.c-country.on{background:#0f3460;border-color:#0a2444}
.c-region.on{background:var(--ocean);border-color:var(--ocean-dk)}
.c-spot.on{background:var(--grass);border-color:var(--grass-dk)}
.c-airline.on{background:var(--peach);border-color:#b85c00}
.c-agency.on{background:var(--lav);border-color:#7a52a8}

/* Range sliders */
.range-wrap{padding:4px 0}
.range-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.range-row:last-child{margin-bottom:0}
.rlbl{font-size:11px;color:var(--muted);white-space:nowrap;min-width:28px}
.rval{font-family:"Nunito",sans-serif;font-size:14px;font-weight:900;color:var(--coral);min-width:52px;text-align:right}
input[type=range]{flex:1;-webkit-appearance:none;height:5px;border-radius:3px;background:var(--sky);border:2px solid var(--border);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--coral);cursor:pointer;border:3px solid #fff;box-shadow:0 2px 4px rgba(0,0,0,.2)}

/* Clear btn */
.clear-btn{font-family:"Nunito",sans-serif;font-size:11px;font-weight:900;color:var(--muted);background:none;border:1.5px solid var(--border);border-radius:999px;padding:4px 12px;cursor:pointer;margin-left:auto;display:block}
.clear-btn:active{transform:scale(.95)}

/* Results */
.rbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px}
.rtxt{font-family:"Nunito",sans-serif;font-size:12px;font-weight:900;color:var(--muted)}
.rcnt{font-family:"Nunito",sans-serif;font-size:12px;font-weight:900;background:var(--coral);color:#fff;padding:3px 11px;border-radius:999px}

/* Tour Card */
.clist{padding:0 12px}
.tcard{background:var(--cloud);border-radius:var(--r);margin-bottom:12px;border:2px solid var(--border);box-shadow:0 4px 0 rgba(0,0,0,.06);overflow:hidden;animation:popin .28s ease backwards}
@keyframes popin{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
.tcard:active{transform:scale(.98)}
.cstripe{height:6px}
.cbody{padding:13px 14px 12px}

/* Agency — big & bold */
.agency-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.agency-name{font-family:"Nunito",sans-serif;font-size:20px;font-weight:900;letter-spacing:-.3px}
.agency-badges{display:flex;gap:5px}
.abadge{font-family:"Nunito",sans-serif;font-size:10px;font-weight:900;padding:3px 9px;border-radius:999px;border:1.5px solid}

.ctitle{font-family:"Nunito",sans-serif;font-size:14px;font-weight:800;color:var(--text);line-height:1.4;margin-bottom:8px}
.ctags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.tpill{font-family:"Nunito",sans-serif;font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px}
.tp-days{background:var(--ocean-lt);color:var(--ocean-dk);border:1.5px solid #b8e4f5}
.tp-free{background:var(--mint-lt);color:var(--grass-dk);border:1.5px solid #b2ede8}
.tp-hot{background:#fff3cd;color:#856404;border:1.5px solid #ffd97d}
.tp-air{background:var(--lav-lt);color:var(--lav);border:1.5px solid #d8c0f8}
.tp-spot{background:var(--peach-lt);color:#b85c00;border:1.5px solid #ffd6a8}

.cfoot{display:flex;align-items:center;justify-content:space-between;border-top:1.5px dashed var(--sky);padding-top:10px}
.cinfo{flex:1}
.cprice-big{font-family:"Nunito",sans-serif;font-size:22px;font-weight:900;color:var(--coral);line-height:1}
.cprice-label{font-size:10px;color:var(--muted);margin-bottom:2px}
.cdate{font-size:11px;color:var(--muted);margin-top:3px}
.cbtn{background:var(--coral);color:#fff;border:none;border-radius:var(--rxs);padding:10px 16px;font-size:12px;font-weight:900;font-family:"Nunito",sans-serif;cursor:pointer;border-bottom:3px solid var(--coral-dk);text-decoration:none;display:inline-block;white-space:nowrap}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-ico{font-size:48px;margin-bottom:12px}
.empty-txt{font-family:"Nunito",sans-serif;font-size:15px;font-weight:800;line-height:1.6}

.footer{text-align:center;padding:20px;font-size:11px;color:var(--muted);font-family:"Nunito",sans-serif;line-height:1.8}
</style>

<script>
// ── 資料結構 ──────────────────────────────
const COUNTRY_DATA = {
  "日本": {
    regions: {
      "東京": ["迪士尼樂園","環球影城","淺草・上野","新宿・澀谷","富士山"],
      "大阪": ["環球影城","道頓堀","心齋橋","奈良公園"],
      "北海道": ["薰衣草富良野","小樽運河","札幌雪祭","函館夜景"],
      "京都": ["嵐山竹林","金閣寺","伏見稻荷","祇園花見小路"],
      "沖繩": ["美麗海水族館","古宇利島","首里城","海灘潛水"],
    }
  },
  "韓國": {
    regions: {
      "首爾": ["景福宮","明洞購物","南山塔","弘大夜生活"],
      "釜山": ["海雲台海灘","甘川文化村","廣安里","札嘎其市場"],
      "濟州島": ["漢拿山","城山日出峰","牛島","黑豬烤肉"],
    }
  },
  "泰國": {
    regions: {
      "曼谷": ["大皇宮","考山路","恰圖恰市集","湄南河遊船"],
      "清邁": ["大象保育營","古城寺廟","夜市","泰式料理課"],
      "普吉島": ["皮皮島","芭東海灘","浮潛","夜市"],
    }
  }
};

// 行程資料已移至外部 data.js 檔案，請編輯 data.js 更新行程

// ── 狀態 ──────────────────────────────────
let selCountry="all", selRegion="all", selSpot="all";
let selAirline="all", selAgency="all";
let daysMax=7, priceMax=60000;

// ── 取得選項 ──────────────────────────────
function getCountries(){return["all",...new Set(TOURS.map(t=>t.country))]}
function getRegions(){
  if(selCountry==="all") return [];
  return Object.keys(COUNTRY_DATA[selCountry]?.regions||{});
}
function getSpots(){
  if(selCountry==="all"||selRegion==="all") return [];
  return COUNTRY_DATA[selCountry]?.regions[selRegion]||[];
}
function getAirlines(){return["all",...new Set(TOURS.map(t=>t.airline))]}
function getAgencies(){return["all",...new Set(TOURS.map(t=>t.agency))]}

// ── 建立 chips ────────────────────────────
function buildChips(containerId, items, selVal, cls, onClickFn, labels){
  const el=document.getElementById(containerId);
  el.innerHTML=items.map(v=>{
    const lbl=labels?.[v]||v;
    const isOn=selVal===v;
    return `<div class="chip ${cls}${isOn?" on":""}" onclick="${onClickFn}('${v}')">${lbl}</div>`;
  }).join("");
}

function refreshChips(){
  const countryLabels={all:"🌏 全部"};
  buildChips("country-chips",getCountries(),selCountry,"c-country","setCountry",countryLabels);

  const regions=getRegions();
  const rSec=document.getElementById("region-sec");
  rSec.style.display=regions.length?"":"none";
  if(regions.length){
    const rLabels={all:"全部地區"};
    buildChips("region-chips",["all",...regions],selRegion,"c-region","setRegion",rLabels);
  }

  const spots=getSpots();
  const sSec=document.getElementById("spot-sec");
  sSec.style.display=spots.length&&selRegion!=="all"?"":"none";
  if(spots.length&&selRegion!=="all"){
    const sLabels={all:"全部景點"};
    buildChips("spot-chips",["all",...spots],selSpot,"c-spot","setSpot",sLabels);
  }

  const airLabels={all:"全部航空"};
  buildChips("airline-chips",getAirlines(),selAirline,"c-airline","setAirline",airLabels);

  const agLabels={all:"全部旅行社","雄獅":"🦁 雄獅","東南":"🧭 東南","易遊網":"🌐 易遊網","可樂":"🎪 可樂","燦星":"⭐ 燦星"};
  buildChips("agency-chips",getAgencies(),selAgency,"c-agency","setAgency",agLabels);
}

// ── 篩選事件 ──────────────────────────────
function setCountry(v){selCountry=v;selRegion="all";selSpot="all";refreshChips();render()}
function setRegion(v){selRegion=v;selSpot="all";refreshChips();render()}
function setSpot(v){selSpot=v;refreshChips();render()}
function setAirline(v){selAirline=v;refreshChips();render()}
function setAgency(v){selAgency=v;refreshChips();render()}

function onDaysMax(v){
  daysMax=parseInt(v);
  document.getElementById("days-max-val").textContent=v==="7"?"7 天以內（不限）":v+" 天以內";
  render();
}
function onPriceMax(v){
  priceMax=parseInt(v);
  document.getElementById("price-max-val").textContent=parseInt(v)>=60000?"不限":"$"+parseInt(v).toLocaleString();
  render();
}

function clearAll(){
  selCountry="all";selRegion="all";selSpot="all";selAirline="all";selAgency="all";
  daysMin=3;daysMax=7;priceMin=0;priceMax=60000;
  document.getElementById("days-max").value=7;
  document.getElementById("price-max").value=60000;
  document.getElementById("days-max-val").textContent="7 天以內（不限）";
  document.getElementById("price-max-val").textContent="不限";
  refreshChips();render();
}

// ── 渲染卡片 ──────────────────────────────
function render(){
  let items=TOURS.slice();
  if(selCountry!=="all") items=items.filter(t=>t.country===selCountry);
  if(selRegion!=="all") items=items.filter(t=>t.region===selRegion);
  if(selSpot!=="all") items=items.filter(t=>t.spots.includes(selSpot));
  if(selAirline!=="all") items=items.filter(t=>t.airline===selAirline);
  if(selAgency!=="all") items=items.filter(t=>t.agency===selAgency);
  items=items.filter(t=>t.days<=daysMax);
  items=items.filter(t=>t.price<=priceMax);

  const el=document.getElementById("results");
  if(!items.length){
    el.innerHTML='<div class="empty"><div class="empty-ico">🔍</div><div class="empty-txt">找不到符合的行程<br>試試調整篩選條件</div></div>';
    return;
  }

  const countryFlag={日本:"🗾",韓國:"🇰🇷",泰國:"🇹🇭"};

  const cards=items.map((t,i)=>`
    <div class="tcard" style="animation-delay:${i*0.06}s">
      <div class="cstripe" style="background:${t.color}"></div>
      <div class="cbody">
        <div class="agency-row">
          <div class="agency-name" style="color:${t.color}">${t.agency}</div>
          <div class="agency-badges">
            ${t.hot?'<span class="abadge" style="background:#fff3cd;color:#856404;border-color:#ffd97d">🔥 熱門</span>':""}
            ${t.noShop?'<span class="abadge" style="background:var(--mint-lt);color:var(--grass-dk);border-color:#b2ede8">無購物</span>':""}
          </div>
        </div>
        <div class="ctitle">${countryFlag[t.country]||"🌏"} ${t.title}</div>
        <div class="ctags">
          <span class="tpill tp-days">✈️ ${t.airline}</span>
          <span class="tpill tp-days">${t.days}天${t.days-1}夜</span>
          ${t.region!=="all"?'<span class="tpill tp-spot">📍 '+t.region+'</span>':""}
        </div>
        <div class="cfoot">
          <div class="cinfo">
            <div class="cprice-label">每人起</div>
            <div class="cprice-big">$${t.price.toLocaleString()}</div>
            <div class="cdate">📅 ${t.dates}</div>
          </div>
          <a class="cbtn" href="${t.url}" target="_blank">查看行程 →</a>
        </div>
      </div>
    </div>
  `).join("");

  el.innerHTML=`
    <div class="rbar">
      <span class="rtxt">共找到行程</span>
      <span class="rcnt">${items.length} 筆 🎯</span>
    </div>
    <div class="clist">${cards}</div>
  `;
}

// ── 初始化 ────────────────────────────────
refreshChips();
render();
</script>
</body>
</html>
