<style>
:root{--klook:#FF6B35;--klook-dk:#C94A15;--kkday:#3AAEDC;--kkday-dk:#1A8BB8;--sky:#EEF6FF;--white:#fff;--text:#1a1a1a;--muted:#8A8A9A;--border:rgba(0,0,0,.08);--sun:#FFD93D;--r:18px;--rsm:12px;--c-transport:#0960C8;--c-ticket:#BF360C;--c-activity:#6A1B9A;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:"Noto Sans TC",sans-serif;background:var(--sky);color:var(--text);max-width:480px;margin:0 auto;padding-bottom:80px;overflow-x:hidden}
.hdr{background:var(--white);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.rainbow{height:5px;background:linear-gradient(90deg,#FF6B6B 0%,#FFD93D 25%,#6BCB77 50%,#4CC9F0 75%,#C77DFF 100%)}
.hdr-inner{display:flex;align-items:center;gap:12px;padding:11px 16px 12px}
.logo-circle{width:52px;height:52px;border-radius:50%;flex-shrink:0;background:url(wunai_fixed.png) center/cover no-repeat;border:2.5px solid var(--sun)}
.site-name{font-family:"Nunito",sans-serif;font-size:18px;font-weight:900;color:var(--klook);line-height:1.1}
.site-name b{color:#3AAEDC}
.site-sub{font-family:"Nunito",sans-serif;font-size:10px;font-weight:700;color:var(--muted);margin-top:2px}
.bnav{position:sticky;bottom:0;width:100%;background:var(--white);border-top:2px solid var(--border);display:flex;padding:6px 0 16px;z-index:200}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;font-family:"Nunito",sans-serif;color:var(--muted);padding:4px 0}
.nbtn.on{color:var(--klook)}
.nico{font-size:20px;line-height:1}
.nlbl{font-size:9px;font-weight:800}
.fpanel{background:var(--white);margin:12px 12px 0;border-radius:var(--r);padding:15px 14px 14px;border:2px solid var(--border);box-shadow:0 4px 0 rgba(0,0,0,.05)}
.fsec{margin-bottom:14px}.fsec:last-child{margin-bottom:0}
.ftitle{font-family:"Nunito",sans-serif;font-size:10px;font-weight:900;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:9px;display:flex;align-items:center;gap:5px}
.fdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pill-group{display:flex;flex-wrap:wrap;gap:7px}
.pill{display:flex;align-items:center;gap:6px;padding:6px 12px 6px 9px;border-radius:999px;border:2px solid var(--border);background:var(--sky);cursor:pointer;font-family:"Nunito",sans-serif;font-size:12px;font-weight:800;color:var(--muted);user-select:none;transition:all .18s}
.pill:active{transform:scale(.93)}
.pill-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--muted);flex-shrink:0;transition:all .18s}
.pill.active{color:#fff;border-color:transparent}
.pill.active .pill-dot{border:2.5px solid rgba(255,255,255,.5);background:rgba(255,255,255,.9)}
.pill-all.active{background:#333}
.pill-country.active{background:#0f3460}
.pill-city.active{background:#3AAEDC}
.pill-type-transport.active{background:var(--c-transport)}
.pill-type-ticket.active{background:var(--c-ticket)}
.pill-type-activity.active{background:var(--c-activity)}
.pill-type-tour.active{background:#2D6A4F}
.pill-type-bundle.active{background:#C77DFF}
.pill-sub.active-transport{background:var(--c-transport);color:#fff;border-color:transparent}
.pill-sub.active-ticket{background:var(--c-ticket);color:#fff;border-color:transparent}
.pill-sub.active-activity{background:var(--c-activity);color:#fff;border-color:transparent}
.pill-sub.active-tour{background:#2D6A4F;color:#fff;border-color:transparent}
.pill-sub.active-bundle{background:#C77DFF;color:#fff;border-color:transparent}
.pill-sub.active-transport .pill-dot,.pill-sub.active-ticket .pill-dot,.pill-sub.active-activity .pill-dot,.pill-sub.active-tour .pill-dot,.pill-sub.active-bundle .pill-dot{border:2.5px solid rgba(255,255,255,.5);background:rgba(255,255,255,.9)}
.pchips{display:flex;gap:8px}
.pchip{flex:1;padding:8px 10px;border-radius:999px;font-family:"Nunito",sans-serif;font-size:13px;font-weight:900;border:2.5px solid var(--border);background:var(--sky);color:var(--muted);cursor:pointer;text-align:center;user-select:none;transition:all .15s}
.pchip:active{transform:scale(.94)}
.pchip.on-all{background:#1a1a1a;border-color:#000;color:#fff}
.pchip.on-klook{background:var(--klook);border-color:var(--klook-dk);color:#fff}
.pchip.on-kkday{background:var(--kkday);border-color:var(--kkday-dk);color:#fff}
.price-label{display:flex;justify-content:space-between;align-items:center;font-family:"Nunito",sans-serif;font-size:11px;font-weight:800;color:var(--muted);margin-bottom:8px}
.price-val{font-size:15px;font-weight:900;color:var(--klook)}
input[type="range"]{width:100%;-webkit-appearance:none;height:5px;border-radius:3px;background:var(--sky);border:2px solid var(--border);outline:none;cursor:pointer}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--klook);border:3px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.2);cursor:pointer}
.search-input{width:100%;padding:8px 14px;border:2px solid var(--border);border-radius:999px;font-family:"Noto Sans TC",sans-serif;font-size:13px;color:#444;background:var(--sky);outline:none;transition:border-color .2s}
.search-input:focus{border-color:#4CC9F0}
.search-input::placeholder{color:var(--muted)}
.clear-btn{font-family:"Nunito",sans-serif;font-size:11px;font-weight:900;color:var(--muted);background:none;border:1.5px solid var(--border);border-radius:999px;padding:4px 13px;cursor:pointer;margin-left:auto;display:block;margin-top:12px}
.clear-btn:active{transform:scale(.95)}
.rbar{display:flex;align-items:center;justify-content:space-between;padding:13px 16px 7px}
.rtxt{font-family:"Nunito",sans-serif;font-size:12px;font-weight:900;color:var(--muted)}
.rcnt{font-family:"Nunito",sans-serif;font-size:12px;font-weight:900;background:var(--klook);color:#fff;padding:3px 12px;border-radius:999px}
.clist{padding:0 12px}
.card{background:var(--white);border-radius:var(--r);margin-bottom:12px;border:2px solid var(--border);box-shadow:0 4px 0 rgba(0,0,0,.06);overflow:hidden;animation:popin .28s ease backwards}
@keyframes popin{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
.cstripe{height:6px}
.cbody{padding:13px 15px 14px}
.card-head{margin-bottom:8px}
.type-badge{display:inline-block;font-family:"Nunito",sans-serif;font-size:10px;font-weight:900;padding:3px 10px;border-radius:999px}
.tb-transport{background:#E3F0FF;color:var(--c-transport);border:1.5px solid #BDDAFF}
.tb-ticket{background:#FFF3E0;color:var(--c-ticket);border:1.5px solid #FFD0A0}
.tb-activity{background:#F3ECFF;color:var(--c-activity);border:1.5px solid #D8C0F8}
.tb-tour{background:#E3FAF8;color:#2D6A4F;border:1.5px solid #B2EDE8}
.tb-bundle{background:#F5EAFF;color:#7B2FBE;border:1.5px solid #DDB8F8}
.attraction-title{font-family:"Noto Sans TC",sans-serif;font-size:15px;font-weight:700;color:var(--text);line-height:1.45;margin-bottom:8px}
.attraction-link{color:var(--text);text-decoration:none;display:block}
.attraction-link:active{opacity:.7}
.detail-arrow{font-family:"Nunito",sans-serif;font-size:13px;color:var(--klook);font-weight:900;margin-left:3px}
.ctags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:2px}
.ctag{font-family:"Nunito",sans-serif;font-size:10px;font-weight:800;padding:2px 9px;border-radius:999px}
.ctag-country{background:#F3E5F5;color:#6A1B9A;border:1.5px solid #D8C0F8}
.ctag-city{background:#E3F2FD;color:#0D47A1;border:1.5px solid #B3D4F5}
.ctag-sub{background:#FFF8E1;color:#BF6F00;border:1.5px solid #FFE082}
.prows{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.prow{display:flex;flex-direction:column;gap:6px;padding:10px 12px;border-radius:var(--rsm);border:1.5px solid var(--border);background:var(--sky)}
.prow-brand{font-family:"Nunito",sans-serif;font-size:13px;font-weight:900}
.brand-klook{color:var(--klook)}
.brand-kkday{color:var(--kkday)}
.prow-price{font-family:"Nunito",sans-serif;font-size:16px;font-weight:900;color:var(--text);line-height:1}
.prow-price small{font-size:10px;font-weight:700;color:var(--muted)}
.cbtn{font-family:"Nunito",sans-serif;font-size:11px;font-weight:900;color:#fff;text-decoration:none;padding:7px 0;border-radius:var(--rsm);border-bottom:3px solid;text-align:center;display:block;transition:opacity .15s}
.cbtn:active{opacity:.75}
.cbtn-klook{background:var(--klook);border-color:var(--klook-dk)}
.cbtn-kkday{background:var(--kkday);border-color:var(--kkday-dk)}
.prows.single{grid-template-columns:1fr}
.prows.single .prow{flex-direction:row;align-items:center;gap:10px}
.prows.single .prow-price{flex:1}
.prows.single .cbtn{padding:9px 16px;display:inline-block;width:auto}
.star-btn{font-family:"Nunito",sans-serif;font-size:13px;font-weight:900;background:var(--white);color:var(--muted);border:2px solid var(--border);border-radius:999px;padding:5px 14px;cursor:pointer;margin-top:8px;display:inline-block;transition:all .15s}
.star-btn.on{background:var(--sun);color:#7a5000;border-color:#e0b000}
.star-btn:active{transform:scale(.95)}
.empty{text-align:center;padding:52px 20px;color:var(--muted)}
.empty-ico{font-size:48px;margin-bottom:12px}
.empty-txt{font-family:"Nunito",sans-serif;font-size:15px;font-weight:800;line-height:1.6}
.contact-link{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--white);border-radius:14px;border:2px solid var(--border);text-decoration:none;margin-bottom:10px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:#222;color:#fff;padding:10px 20px;border-radius:999px;font-size:13px;font-weight:700;font-family:"Nunito",sans-serif;opacity:0;transition:all .22s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.footer{text-align:center;padding:20px 16px;font-family:"Nunito",sans-serif;font-size:11px;color:var(--muted);line-height:1.9}

/* ── 團體行懶人包 ── */
:root{--tour-green:#2D6A4F;--tour-green-dk:#1B4332;--tour-amber:#FF9A3C;--tour-amber-dk:#C96A00;}
.tour-hero{margin:12px 12px 0;border-radius:var(--r);overflow:hidden;background:linear-gradient(135deg,#1B4332 0%,#2D6A4F 50%,#40916C 100%);padding:12px 16px 12px;position:relative}
.tour-hero::after{content:'✈️';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:48px;opacity:.18}
.tour-hero-label{font-family:"Nunito",sans-serif;font-size:10px;font-weight:900;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:4px}
.tour-hero-title{font-family:"Nunito",sans-serif;font-size:20px;font-weight:900;color:#fff;line-height:1.2;margin-bottom:4px}
.tour-hero-sub{font-family:"Nunito",sans-serif;font-size:11px;font-weight:700;color:rgba(255,255,255,.75)}
.tour-theme-tabs{display:flex;gap:8px;padding:12px 12px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tour-theme-tabs::-webkit-scrollbar{display:none}
.ttab{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;font-family:"Nunito",sans-serif;font-size:12px;font-weight:900;border:2px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer;transition:all .18s;white-space:nowrap}
.ttab:active{transform:scale(.94)}
.ttab.on-disney{background:#3B5BDB;border-color:#2F4AC9;color:#fff}
.ttab.on-usj{background:#CC3300;border-color:#AA2200;color:#fff}
.ttab.on-kansai{background:var(--tour-green);border-color:var(--tour-green-dk);color:#fff}
.tour-filter{background:var(--white);margin:10px 12px 0;border-radius:var(--r);padding:12px;border:2px solid var(--border);box-shadow:0 4px 0 rgba(0,0,0,.05)}
.tfsec{margin-bottom:10px}.tfsec:last-child{margin-bottom:0}
.tftitle{font-family:"Nunito",sans-serif;font-size:10px;font-weight:900;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.tour-pills{display:flex;flex-wrap:wrap;gap:6px}
.tpill{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:999px;border:2px solid var(--border);background:var(--sky);cursor:pointer;font-family:"Nunito",sans-serif;font-size:12px;font-weight:800;color:var(--muted);user-select:none;transition:all .15s;white-space:nowrap}
.tpill:active{transform:scale(.93)}
.tpill.on{color:#fff;border-color:transparent;background:#333}
.tpill.on-city-taipei{background:#0f3460}
.tpill.on-city-taichung{background:#C96A00}
.tpill.on-city-kaohsiung{background:#B91C1C}
.tpill.on-park-single{background:var(--tour-green)}
.tpill.on-park-double{background:#7C3AED}
.tpill.on-days{background:#0369A1}
.tpill.on-family{background:#BE185D}
.spot-chip{padding:5px 11px;border-radius:999px;border:2px solid var(--border);background:var(--sky);cursor:pointer;font-family:"Nunito",sans-serif;font-size:11px;font-weight:800;color:var(--muted);user-select:none;transition:all .15s;white-space:nowrap}
.spot-chip:active{transform:scale(.93)}
.spot-chip.on{background:#0D7247;color:#fff;border-color:#0A5C38}
.tour-rbar{display:flex;align-items:center;justify-content:space-between;padding:13px 16px 7px}
.tour-rcnt{font-family:"Nunito",sans-serif;font-size:12px;font-weight:900;background:var(--tour-green);color:#fff;padding:3px 12px;border-radius:999px}
.tour-card{background:var(--white);border-radius:var(--r);margin-bottom:10px;border:2px solid var(--border);box-shadow:0 4px 0 rgba(0,0,0,.06);overflow:hidden;animation:popin .28s ease backwards}
.tour-stripe{height:5px}
.tour-cbody{padding:12px 14px 13px}
.tour-agency-badge{display:inline-flex;align-items:center;gap:4px;font-family:"Nunito",sans-serif;font-size:10px;font-weight:900;padding:2px 9px;border-radius:999px;margin-bottom:7px}
.badge-lion{background:#E3F0FF;color:#1E40AF;border:1.5px solid #BDDAFF}
.badge-settour{background:#FFF3E0;color:#9A3412;border:1.5px solid #FED7AA}
.badge-eztravel{background:#ECFDF5;color:#065F46;border:1.5px solid #A7F3D0}
.badge-cola{background:#F5F3FF;color:#5B21B6;border:1.5px solid #DDD6FE}
.badge-star{background:#FFFBEB;color:#92400E;border:1.5px solid #FDE68A}
.tour-title{font-family:"Noto Sans TC",sans-serif;font-size:14px;font-weight:700;color:var(--text);line-height:1.5;margin-bottom:8px}
.tour-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.ttag{font-family:"Nunito",sans-serif;font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px}
.ttag-city-taipei{background:#DBEAFE;color:#1E40AF;border:1.5px solid #BFDBFE}
.ttag-city-taichung{background:#FEF3C7;color:#92400E;border:1.5px solid #FDE68A}
.ttag-city-kaohsiung{background:#FEE2E2;color:#991B1B;border:1.5px solid #FECACA}
.ttag-park-single{background:#D1FAE5;color:#065F46;border:1.5px solid #A7F3D0}
.ttag-park-double{background:#EDE9FE;color:#4C1D95;border:1.5px solid #DDD6FE}
.ttag-days{background:#F1F5F9;color:#475569;border:1.5px solid #E2E8F0}
.ttag-family{background:#FCE7F3;color:#831843;border:1.5px solid #FBCFE8}
.spot-match-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.spot-match-chip{font-family:"Nunito",sans-serif;font-size:10px;font-weight:900;padding:2px 8px;border-radius:999px;background:#D1FAE5;color:#065F46;border:1.5px solid #6EE7B7}
.tour-goto-btn{display:block;text-align:center;font-family:"Nunito",sans-serif;font-size:12px;font-weight:900;color:#fff;background:var(--tour-green);border-radius:var(--rsm);padding:9px 0;text-decoration:none;border-bottom:3px solid var(--tour-green-dk);transition:opacity .15s}
.tour-goto-btn:active{opacity:.75}
.tour-goto-btn-noaff{display:block;text-align:center;font-family:"Nunito",sans-serif;font-size:12px;font-weight:900;color:#fff;background:#94A3B8;border-radius:var(--rsm);padding:9px 0;text-decoration:none;border-bottom:3px solid #64748B;transition:opacity .15s}
.tour-goto-btn-noaff:active{opacity:.75}
.tclear-btn{font-family:"Nunito",sans-serif;font-size:11px;font-weight:900;color:var(--muted);background:none;border:1.5px solid var(--border);border-radius:999px;padding:4px 13px;cursor:pointer;margin-left:auto;display:block;margin-top:10px}

/* ── 兩個入口按鈕 ── */
.tour-entry-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 12px 0}
.tour-entry-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:14px 8px;border-radius:var(--r);border:2.5px solid transparent;cursor:pointer;transition:all .18s;font-family:"Nunito",sans-serif}
.tour-entry-btn:active{transform:scale(.96)}
.tour-entry-quiz{background:linear-gradient(135deg,#667eea,#764ba2);border-color:transparent;box-shadow:0 4px 0 rgba(102,126,234,.35)}
.tour-entry-quiz.active{background:linear-gradient(135deg,#4f46e5,#6d28d9);box-shadow:0 2px 0 rgba(102,126,234,.35)}
.tour-entry-filter{background:var(--white);border-color:var(--border);box-shadow:0 4px 0 rgba(0,0,0,.06)}
.tour-entry-ico{font-size:26px;line-height:1}
.tour-entry-txt{font-size:14px;font-weight:900;color:#fff}
.tour-entry-filter .tour-entry-txt{color:var(--text)}
.tour-entry-sub{font-size:10px;font-weight:700;color:rgba(255,255,255,.8);text-align:center;line-height:1.3}
.tour-entry-filter .tour-entry-sub{color:var(--muted)}

/* ── Quiz 問答流程 ── */
.quiz-toggle{display:flex;align-items:center;justify-content:center;gap:8px;margin:12px 12px 0;padding:12px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:var(--r);border:none;width:calc(100% - 24px);cursor:pointer;font-family:"Nunito",sans-serif;font-size:14px;font-weight:900;color:#fff;box-shadow:0 4px 0 rgba(102,126,234,.4);transition:opacity .15s}
.quiz-toggle:active{opacity:.8}
.quiz-toggle-sub{font-size:10px;font-weight:700;opacity:.85;margin-top:2px}
.quiz-box{background:var(--white);margin:10px 12px 0;border-radius:var(--r);border:2px solid #DDD6FE;box-shadow:0 4px 0 rgba(118,75,162,.15);overflow:hidden;display:none}
.quiz-box.open{display:block}
.quiz-progress{height:4px;background:#F3F0FF}
.quiz-progress-bar{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);transition:width .3s}
.quiz-inner{padding:16px 14px 14px}
.quiz-step{display:none}.quiz-step.active{display:block}
.quiz-qlabel{font-family:"Nunito",sans-serif;font-size:10px;font-weight:900;color:#7C3AED;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.quiz-q{font-family:"Noto Sans TC",sans-serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:14px;line-height:1.4}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.quiz-opts.single-col{grid-template-columns:1fr}
.quiz-opt{padding:11px 10px;border-radius:var(--rsm);border:2px solid var(--border);background:var(--sky);cursor:pointer;font-family:"Nunito",sans-serif;font-size:13px;font-weight:800;color:var(--text);text-align:center;transition:all .15s;line-height:1.3}
.quiz-opt:active{transform:scale(.96)}
.quiz-opt.selected{border-color:#7C3AED;background:#F5F3FF;color:#5B21B6}
.quiz-spot-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.quiz-spot{padding:7px 12px;border-radius:999px;border:2px solid var(--border);background:var(--sky);cursor:pointer;font-family:"Nunito",sans-serif;font-size:12px;font-weight:800;color:var(--muted);transition:all .15s}
.quiz-spot.selected{border-color:#0D7247;background:#D1FAE5;color:#065F46}
.quiz-nav{display:flex;gap:8px;align-items:center}
.quiz-next{flex:1;padding:10px;background:#7C3AED;color:#fff;border:none;border-radius:var(--rsm);font-family:"Nunito",sans-serif;font-size:13px;font-weight:900;cursor:pointer;border-bottom:3px solid #5B21B6;transition:opacity .15s}
.quiz-next:active{opacity:.8}
.quiz-next:disabled{opacity:.35;cursor:not-allowed}
.quiz-back{padding:10px 14px;background:none;border:1.5px solid var(--border);border-radius:var(--rsm);font-family:"Nunito",sans-serif;font-size:13px;font-weight:800;color:var(--muted);cursor:pointer}
.quiz-skip{background:none;border:none;font-family:"Nunito",sans-serif;font-size:12px;font-weight:800;color:var(--muted);cursor:pointer;text-decoration:underline;padding:0 4px}
.quiz-done{text-align:center;padding:16px 8px 8px}
.quiz-done-ico{font-size:36px;margin-bottom:8px}
.quiz-done-txt{font-family:"Nunito",sans-serif;font-size:14px;font-weight:900;color:var(--text);margin-bottom:4px}
.quiz-done-sub{font-family:"Nunito",sans-serif;font-size:11px;color:var(--muted);margin-bottom:14px}
.quiz-apply-btn{display:block;width:100%;padding:11px;background:var(--tour-green);color:#fff;border:none;border-radius:var(--rsm);font-family:"Nunito",sans-serif;font-size:14px;font-weight:900;cursor:pointer;border-bottom:3px solid var(--tour-green-dk)}
.quiz-reset{display:block;width:100%;margin-top:8px;padding:8px;background:none;border:1.5px solid var(--border);border-radius:var(--rsm);font-family:"Nunito",sans-serif;font-size:12px;font-weight:800;color:var(--muted);cursor:pointer}
</style>

  '套票':'套票'
};
const SUB_ACTIVE_CLS={"交通運輸":"active-transport","景點門票":"active-ticket","活動體驗":"active-activity","一日遊":"active-tour","套票":"active-bundle"};

let selCountry="",selCity="",selType="",selSubtype="",selPlatform="",maxPrice=0,tab="tickets";

// ── 團體行狀態 ──
let tourTheme='東京迪士尼',tourCity='',tourPark='',tourDays='',tourFamily=false,tourSpots=[],tourAgency='',tourSort='default';

function getSaved(){try{return JSON.parse(localStorage.getItem('ivy_tickets')||'[]')}catch{return[]}}
function setSaved(arr){try{localStorage.setItem('ivy_tickets',JSON.stringify(arr))}catch{}}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000)}

function goTab(t){
  tab=t;
  ['tickets','tours','saved','info'].forEach(x=>{
    const el=document.getElementById('nb-'+x);
    if(el)el.className='nbtn'+(x===t?' on':'');
  });
  // 更新網址 hash
  history.replaceState(null,'','#'+t);
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildCountryPills(){
  const countries=[...new Set(tickets.map(t=>t.country))].sort();
  const g=document.getElementById('country-group');if(!g)return;
  g.innerHTML=`<div class="pill pill-all pill-country ${selCountry===''?'active':''}" onclick="setCountry('')"><div class="pill-dot"></div>🌏 所有國家</div>`
    +countries.map(v=>`<div class="pill pill-country ${selCountry===v?'active':''}" onclick="setCountry('${v}')" data-val="${v}"><div class="pill-dot"></div>${v}</div>`).join('');
}

function buildCityPills(){
  const cities=[...new Set(tickets.filter(t=>!selCountry||t.country===selCountry).map(t=>t.city))].sort();
  const g=document.getElementById('city-group');if(!g)return;
  g.innerHTML=`<div class="pill pill-all pill-city ${selCity===''?'active':''}" onclick="setCity('')"><div class="pill-dot"></div>📍 所有城市</div>`
    +cities.map(v=>`<div class="pill pill-city ${selCity===v?'active':''}" onclick="setCity('${v}')" data-val="${v}"><div class="pill-dot"></div>${v}</div>`).join('');
}

function buildSubtypePills(){
  const avail=tickets.filter(t=>{
    if(selCountry&&t.country!==selCountry)return false;
    if(selCity&&t.city!==selCity)return false;
    if(selType&&t.type!==selType)return false;
    return true;
  });
  const subtypes=[...new Set(avail.map(t=>t.subtype))].sort();
  const g=document.getElementById('sub-group');if(!g)return;
  if(!subtypes.length){g.innerHTML='<span style="font-size:11px;color:var(--muted)">（請先選擇上方條件）</span>';return;}
  g.innerHTML=`<div class="pill pill-all ${selSubtype===''?'active':''}" style="${selSubtype===''?'background:#555;color:#fff;border-color:transparent':''}" onclick="setSubtype('')"><div class="pill-dot"></div>全部</div>`
    +subtypes.map(v=>{
      const parentType=SUB_TYPE_MAP[v]||'';
      const activeCls=SUB_ACTIVE_CLS[parentType]||'';
      const isActive=selSubtype===v;
      return `<div class="pill pill-sub ${isActive?activeCls:''}" onclick="setSubtype('${v}')" data-val="${v}"><div class="pill-dot"></div>${v}</div>`;
    }).join('');
}

function setCountry(val){selCountry=val;selCity='';selSubtype='';updatePills();renderTickets();}
function setCity(val){selCity=val;selSubtype='';updatePills();renderTickets();}

function setType(val){
  selType=val;selSubtype='';
  document.querySelectorAll('#type-group .pill').forEach(el=>el.classList.remove('active'));
  const typeMap={'':'pill-all','交通運輸':'pill-type-transport','景點門票':'pill-type-ticket','活動體驗':'pill-type-activity','一日遊':'pill-type-tour','套票':'pill-type-bundle'};
  const el=document.querySelector('.'+typeMap[val]);if(el)el.classList.add('active');
  buildSubtypePills();
  renderTickets();
}

function setSubtype(val){
  selSubtype=val;
  buildSubtypePills();
  renderTickets();
}

function setPlatform(val){
  selPlatform=val;
  document.getElementById('chip-all').className='pchip'+(val===''?' on-all':'');
  document.getElementById('chip-klook').className='pchip'+(val==='Klook'?' on-klook':'');
  document.getElementById('chip-kkday').className='pchip'+(val==='KKday'?' on-kkday':'');
  renderTickets();
}

function onSlider(){
  const val=parseInt(document.getElementById('slider-price').value);
  document.getElementById('price-display').textContent=val>=maxPrice?'不限':'NT$ '+val.toLocaleString();
  renderTickets();
}

function updatePills(){
  buildCountryPills();
  buildCityPills();
  buildSubtypePills();
}

function clearAll(){
  selCountry='';selCity='';selType='';selSubtype='';selPlatform='';
  document.querySelectorAll('#type-group .pill').forEach(el=>el.classList.remove('active'));
  const all=document.querySelector('#type-group .pill-all');if(all)all.classList.add('active');
  setPlatform('');
  const sl=document.getElementById('slider-price');if(sl)sl.value=maxPrice;
  const pd=document.getElementById('price-display');if(pd)pd.textContent='不限';
  const inp=document.getElementById('inp-name');if(inp)inp.value='';
  updatePills();
  renderTickets();
}

function toggleSave(attrKey){
  const saved=getSaved();
  const idx=saved.indexOf(attrKey);
  if(idx>-1){saved.splice(idx,1);setSaved(saved);toast('已取消收藏');}
  else{saved.push(attrKey);setSaved(saved);toast('已加入收藏 ⭐');}
  render();
}

function getFiltered(){
  const sliderVal=parseInt(document.getElementById('slider-price').value);
  const budget=sliderVal<=maxPrice?sliderVal:maxPrice||99999;
  const nameSearch=(document.getElementById('inp-name')?.value||'').trim().toLowerCase();
  return tickets.filter(t=>{
    if(selCountry&&t.country!==selCountry)return false;
    if(selCity&&t.city!==selCity)return false;
    if(selType&&t.type!==selType)return false;
    if(selSubtype&&t.subtype!==selSubtype)return false;
    if(selPlatform&&t.platform!==selPlatform)return false;
    if(t.price>budget)return false;
    if(nameSearch){const k=(t.attraction||t.name).toLowerCase();if(!k.includes(nameSearch))return false;}
    return true;
  });
}

function toGroups(arr){
  const m=new Map();
  arr.forEach(t=>{
    const k=t.attraction||t.name;
    if(!m.has(k))m.set(k,{attraction:k,country:t.country,city:t.city,type:t.type,subtype:t.subtype,tickets:[]});
    m.get(k).tickets.push(t);
  });
  return Array.from(m.values());
}

function buildCards(groups,savedList){
  return groups.map((g,i)=>{
    const hasKlook=g.tickets.some(t=>t.platform==='Klook');
    const hasKKday=g.tickets.some(t=>t.platform==='KKday');
    let stripe=hasKlook&&hasKKday?'linear-gradient(90deg,#FF6B35 50%,#3AAEDC 50%)':hasKlook?'#FF6B35':'#3AAEDC';
    const typeCls=TYPE_CLS[g.type]||'tb-ticket';
    const isSingle=g.tickets.length===1;
    const isSaved=savedList.includes(g.attraction);
    const slug=SLUG_MAP[g.attraction.trim()];
    const titleHTML=slug?`<a class="attraction-title attraction-link" href="./${slug}/">${g.attraction} <span class="detail-arrow">›</span></a>`:`<div class="attraction-title">${g.attraction}</div>`;
    const rows=g.tickets.map(t=>{
      const isK=t.platform==='Klook';
      return `<div class="prow"><div class="prow-brand ${isK?'brand-klook':'brand-kkday'}">${t.platform}</div><div class="prow-price">NT$&thinsp;${t.price.toLocaleString()}<small> 起</small></div><a class="cbtn ${isK?'cbtn-klook':'cbtn-kkday'}" href="${t.url}" target="_blank" rel="noopener noreferrer">立即預訂</a></div>`;
    }).join('');
    return `<div class="card" style="animation-delay:${i*0.04}s">
      <div class="cstripe" style="background:${stripe}"></div>
      <div class="cbody">

  const mc=document.getElementById('mc');

  const m=new Map();
  tickets.forEach(t=>{
    const k=t.attraction||t.name;
    if(!saved.includes(k))return;
    if(!m.has(k))m.set(k,{attraction:k,country:t.country,city:t.city,type:t.type,subtype:t.subtype,tickets:[]});
    m.get(k).tickets.push(t);
  });
  const groups=Array.from(m.values());
  mc.innerHTML=`<div class="rbar"><span class="rtxt">我的收藏</span><span class="rcnt">${groups.length} 筆</span></div><div class="clist">${buildCards(groups,saved)}</div>`;
}

function setTourTheme(theme){
  tourTheme=theme; tourCity=''; tourPark=''; tourDays=''; tourFamily=false; tourSpots=[]; tourAgency=''; tourSort='default';
  renderTours();
}
function toggleTourCity(v){
  // v='' 代表不限，直接清空；否則切換該城市
  tourCity=(tourCity===v&&v!==''?'':v);
  renderTours();
}
function toggleTourPark(v){ tourPark=(tourPark===v?'':v); renderTours(); }
function toggleTourDays(v){ tourDays=(tourDays===v?'':v); renderTours(); }
function toggleTourFamily(){ tourFamily=!tourFamily; renderTours(); }
function toggleTourSpot(v){
  const i=tourSpots.indexOf(v);
  if(i>-1) tourSpots.splice(i,1); else tourSpots.push(v);
  renderTours();
}
function toggleTourAgency(v){ tourAgency=(tourAgency===v?'':v); renderTours(); }
function setTourSort(v){ tourSort=v; renderTours(); }
function clearTourFilters(){ tourCity='';tourPark='';tourDays='';tourFamily=false;tourSpots=[];tourAgency='';tourSort='default'; renderTours(); }

function getTourFiltered(){
  let result = tours.filter(t=>{
    if(t.theme!==tourTheme) return false;
    if(tourCity && t.city!==tourCity) return false;
    if(tourPark && t.park!==tourPark) return false;
    if(tourDays && t.days!==parseInt(tourDays)) return false;
    if(tourFamily && !t.family) return false;
    if(tourAgency && t.agency!==tourAgency) return false;
    return true;
  });

  // 排序
  if(tourSort==='days_asc') result.sort((a,b)=>a.days-b.days);
  else if(tourSort==='days_desc') result.sort((a,b)=>b.days-a.days);
  else if(tourSpots.length>0) {
    result.sort((a,b)=>{
      const am=tourSpots.filter(s=>a.spots.includes(s)).length;
      const bm=tourSpots.filter(s=>b.spots.includes(s)).length;
      return bm-am||a.price-b.price;
    });
  }
  return result;
}

let quizOpen = false;
let quizStep = 0;
let quizAns = { city:'', park:'單', days:'', family:false, spots:[] };

function toggleQuiz(){
  quizOpen = !quizOpen;
  quizStep = 0;
  quizAns = { city:'', park:'單', days:'', family:false, spots:[] };
  // 展開quiz時收起篩選器、主題tabs；關閉時展開
  const filterEl = document.getElementById('tour-filter-anchor');
  const tabsEl = document.getElementById('tour-theme-tabs');
  if(filterEl) filterEl.style.display = quizOpen ? 'none' : '';
  if(tabsEl) tabsEl.style.display = quizOpen ? 'none' : '';
  renderTours();
  if(quizOpen) setTimeout(()=>{ document.querySelector('.quiz-box')?.scrollIntoView({behavior:'smooth',block:'nearest'}); },100);
}

function quizSelectSingle(stepId, val){
  if(stepId==='city') quizAns.city=val;
  else if(stepId==='park') quizAns.park=val;
  else if(stepId==='days') quizAns.days=val;
  else if(stepId==='family') quizAns.family=(val==='yes');
  document.querySelectorAll('.quiz-opt').forEach(el=>el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  document.querySelector('.quiz-next').disabled=false;
}

function quizToggleSpot(el, spot){
  el.classList.toggle('selected');
  const i=quizAns.spots.indexOf(spot);
  if(i>-1) quizAns.spots.splice(i,1); else quizAns.spots.push(spot);
}

function quizNext(){
  const steps=QUIZ_STEPS[tourTheme];
  if(quizStep<steps.length-1){ quizStep++; renderQuizSteps(); }
  else { renderQuizDone(); }
}

function quizBack(){
  if(quizStep>0){ quizStep--; renderQuizSteps(); }
  else { quizOpen=false; renderTours(); }
}

function quizSkip(){
  const steps=QUIZ_STEPS[tourTheme];
  if(quizStep<steps.length-1){ quizStep++; renderQuizSteps(); }
  else { renderQuizDone(); }
}

function applyQuizResults(){
  tourCity=quizAns.city;
  if(tourTheme==='東京迪士尼') tourPark=quizAns.park||'';
  tourDays=quizAns.days;
  tourFamily=quizAns.family;
  tourSpots=[...quizAns.spots];
  quizOpen=false;
  // 展開篩選器、主題tabs和結果列表
  const filterEl = document.getElementById('tour-filter-anchor');
  const tabsEl = document.getElementById('tour-theme-tabs');
  if(filterEl) filterEl.style.display = '';
  if(tabsEl) tabsEl.style.display = '';
  renderTours();
  setTimeout(()=>{ document.getElementById('tour-theme-tabs')?.scrollIntoView({behavior:'smooth',block:'start'}); },150);
}

function resetQuiz(){
  quizStep=0;
  quizAns={ city:'', park:'單', days:'', family:false, spots:[] };
  renderQuizSteps();
}

function renderQuizSteps(){
  const steps=QUIZ_STEPS[tourTheme];
  const step=steps[quizStep];
  const pct=Math.round((quizStep/steps.length)*100);
  const box=document.querySelector('.quiz-box');
  if(!box) return;

  const isLast=quizStep===steps.length-1;
  const isSpotsStep=step.type==='multi';

  let optsHTML='';
  if(isSpotsStep){
    optsHTML=`<div class="quiz-spot-grid">${step.opts.map(s=>
      `<div class="quiz-spot ${quizAns.spots.includes(s)?'selected':''}" onclick="quizToggleSpot(this,'${s}')">${s}</div>`
    ).join('')}</div>`;
  } else {
    const isSingle=(step.opts.length<=2);
    optsHTML=`<div class="quiz-opts ${isSingle?'single-col':''}">${step.opts.map(o=>{
      const cur=(step.id==='city'&&quizAns.city===o.v)||(step.id==='park'&&quizAns.park===o.v)||(step.id==='days'&&quizAns.days===o.v)||(step.id==='family'&&((o.v==='yes'&&quizAns.family)||(o.v==='no'&&!quizAns.family)));
      return `<div class="quiz-opt ${cur?'selected':''}" onclick="quizSelectSingle('${step.id}','${o.v}')">${o.l.replace(/\n/g,'<br>')}</div>`;
    }).join('')}</div>`;
  }

  box.innerHTML=`
    <div class="quiz-progress"><div class="quiz-progress-bar" style="width:${pct}%"></div></div>
    <div class="quiz-inner">
      <div class="quiz-step active">
        <div class="quiz-qlabel">${step.label}</div>
        <div class="quiz-q">${step.q}</div>
        ${optsHTML}
        <div class="quiz-nav">
          <button class="quiz-back" onclick="quizBack()">← 上一題</button>
          <button class="quiz-next" ${isSpotsStep?'':'disabled'} onclick="quizNext()">${isLast?'看結果 →':'下一題 →'}</button>
          ${isSpotsStep?'':`<button class="quiz-skip" onclick="quizSkip()">跳過</button>`}
        </div>
      </div>
    </div>`;
}

    <div class="quiz-inner">
      <div class="quiz-done">
        <div class="quiz-done-ico">🎉</div>
        <div class="quiz-done-txt">找到 ${preview.length} 個符合行程！</div>
        <div class="quiz-done-sub">幫你套用到篩選器，還可以再微調</div>
        <button class="quiz-apply-btn" onclick="applyQuizResults()">套用結果，看行程 →</button>
        <button class="quiz-reset" onclick="resetQuiz()">重新回答</button>
      </div>
    </div>`;
}

function renderTours(){
  const mc=document.getElementById('mc');
  const meta=THEME_META[tourTheme];
  const filtered=getTourFiltered();

  const tabsHTML=Object.entries(THEME_META).map(([name,m])=>
    `<div class="ttab ${tourTheme===name?m.tabCls:''}" onclick="setTourTheme('${name}')">${m.icon} ${name}</div>`
  ).join('');

  const cities=['台北','台中','高雄'];
  const cityPills=[
    // 不限選項，tourCity='' 時就是不限
    `<div class="tpill ${tourCity===''?'on':''}" style="${tourCity===''?'background:#475569;color:#fff;border-color:#334155':''}" onclick="toggleTourCity('')">🌐 不限</div>`,
    ...cities.map(c=>{
      const cls=tourCity===c?`on tpill-on on-city-${c==='台北'?'taipei':c==='台中'?'taichung':'kaohsiung'}`:'';
      return `<div class="tpill ${cls}" onclick="toggleTourCity('${c}')">🛫 ${c}</div>`;
    })
  ].join('');

  // 旅行社篩選（只顯示該主題有的旅行社）
  const availAgencies=[...new Set(tours.filter(t=>t.theme===tourTheme).map(t=>t.agency))];
  const agencyColors={'雄獅':'#3B5BDB','東南':'#EA580C','易遊網':'#059669','可樂':'#7C3AED','燦星':'#D97706'};
  const agencyPills=availAgencies.map(a=>{
    const isOn=tourAgency===a;
    const color=agencyColors[a]||'#333';
    return `<div class="tpill" style="${isOn?`background:${color};color:#fff;border-color:${color}`:''}; transition:all .15s" onclick="toggleTourAgency('${a}')">${a}</div>`;
  }).join('');

  // 排序按鈕
  const sortOpts=[
    {v:'default',l:'預設'},
    {v:'days_asc',l:'📅 天數少→多'},
    {v:'days_desc',l:'📅 天數多→少'},
  ];
  const sortBtns=sortOpts.map(o=>
    `<div class="tpill ${tourSort===o.v?'on':''}" style="${tourSort===o.v?'background:#475569;color:#fff;border-color:#334155':''}" onclick="setTourSort('${o.v}')">${o.l}</div>`
  ).join('');



  const parkHTML=tourTheme==='東京迪士尼'?`
    <div class="tfsec">
      <div class="tftitle"><span class="fdot" style="background:#7C3AED"></span>樂園</div>
      <div class="tour-pills">
        <div class="tpill ${tourPark==='單'?'on tpill-on on-park-single':''}" onclick="toggleTourPark('單')">🎡 單樂園</div>
        <div class="tpill ${tourPark==='雙'?'on tpill-on on-park-double':''}" onclick="toggleTourPark('雙')">🎡🎡 雙樂園</div>
      </div>
    </div>`:'';

  const allDays=[...new Set(tours.filter(t=>t.theme===tourTheme).map(t=>t.days))].sort((a,b)=>a-b);
  const dayPills=allDays.map(d=>{
    const on=tourDays===String(d)?'on tpill-on on-days':'';
    return `<div class="tpill ${on}" onclick="toggleTourDays('${d}')">${d}天</div>`;
  }).join('');

  const spotChips=meta.spots.map(s=>{
    const on=tourSpots.includes(s)?'on':'';
    return `<span class="spot-chip ${on}" onclick="toggleTourSpot('${s}')">${s}</span>`;
  }).join('');

  const familyOn=tourFamily?'on tpill-on on-family':'';

  const cardsHTML=filtered.length?filtered.map((t,i)=>{
    const matched=tourSpots.filter(s=>t.spots.includes(s));
    const stripe=AGENCY_STRIPE[t.agency]||'#2D6A4F';
    const badge=AGENCY_BADGE[t.agency]||'badge-lion';
    const cityTag=`ttag-city-${t.city==='台北'?'taipei':t.city==='台中'?'taichung':'kaohsiung'}`;
    const parkTag=t.park==='雙'?'ttag-park-double':'ttag-park-single';
    const matchHTML=matched.length?`<div class="spot-match-row">${matched.map(s=>`<span class="spot-match-chip">✓ ${s}</span>`).join('')}</div>`:'';
    const familyTag=t.family?'<span class="ttag ttag-family">👨‍👩‍👧 親子</span>':'';
    const parkLabel=tourTheme==='東京迪士尼'?`<span class="ttag ${parkTag}">${t.park}樂園</span>`:'';
    return `<a class="tour-card" href="${t.url}" target="_blank" rel="noopener noreferrer" style="text-decoration:none;display:block;animation-delay:${i*0.04}s">
      <div class="tour-stripe" style="background:${stripe}"></div>
      <div class="tour-cbody">
        <div class="tour-agency-badge ${badge}">${t.agency}</div>
        <div class="tour-title">${t.title}</div>
        <div class="tour-tags">
          <span class="ttag ttag-city-${t.city==='台北'?'taipei':t.city==='台中'?'taichung':'kaohsiung'}">${t.city}</span>
          ${parkLabel}
          <span class="ttag ttag-days">${t.days}天</span>
          ${familyTag}
        </div>
        ${matchHTML}
        <div class="${t.hasAff?'tour-goto-btn':'tour-goto-btn-noaff'}">查看出團日期與價格 →</div>
      </div>
    </a>`;
  }).join(''):`<div class="empty"><div class="empty-ico">🔍</div><div class="empty-txt">沒有符合條件的行程<br>試試調整篩選條件</div></div>`;

  mc.innerHTML=`
    <div class="tour-hero">
      <div class="tour-hero-label">軟糖媽咪Ivy精選</div>
      <div class="tour-hero-title">海外團體行懶人包</div>
      <div class="tour-hero-sub">幫你找到最適合的行程 · 點卡片直接看最新價格</div>
    </div>
    <div class="tour-entry-wrap">
      <button class="tour-entry-btn tour-entry-quiz ${quizOpen?'active':''}" onclick="toggleQuiz()">
        <div class="tour-entry-ico">✨</div>
        <div class="tour-entry-txt">幫我推薦</div>
        <div class="tour-entry-sub">回答幾題找到最適合的</div>
      </button>
      <button class="tour-entry-btn tour-entry-filter" onclick="document.getElementById('tour-filter-anchor').scrollIntoView({behavior:'smooth',block:'start'})">
        <div class="tour-entry-ico">🔍</div>
        <div class="tour-entry-txt">直接篩選</div>
        <div class="tour-entry-sub">我已經知道想找什麼</div>
      </button>
    </div>
    <div class="quiz-box ${quizOpen?'open':''}"></div>
    <div class="tour-theme-tabs" id="tour-theme-tabs">${tabsHTML}</div>
    <div class="tour-filter" id="tour-filter-anchor">
      <div class="tfsec">
        <div class="tftitle"><span class="fdot" style="background:#0f3460"></span>出發城市</div>
        <div class="tour-pills">${cityPills}</div>
      </div>
      ${parkHTML}
      <div class="tfsec">
        <div class="tftitle"><span class="fdot" style="background:#0369A1"></span>天數</div>
        <div class="tour-pills">${dayPills}</div>
      </div>
      <div class="tfsec">
        <div class="tftitle"><span class="fdot" style="background:#6B21A8"></span>旅行社</div>
        <div class="tour-pills">${agencyPills}</div>
      </div>

      <div class="tfsec">
        <div class="tftitle"><span class="fdot" style="background:#BE185D"></span>親子行程</div>
        <div class="tour-pills">
          <div class="tpill ${familyOn}" onclick="toggleTourFamily()">👨‍👩‍👧 有兒童優惠</div>
        </div>
      </div>
      <div class="tfsec">
        <div class="tftitle"><span class="fdot" style="background:#475569"></span>排序</div>
        <div class="tour-pills">${sortBtns}</div>
      </div>
      <div class="tfsec">
        <div class="tftitle" style="cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'flex':'none';this.querySelector('.fold-arrow').textContent=this.nextElementSibling.style.display==='none'?'▶':'▼'">
          <span class="fdot" style="background:#0D7247"></span>想去的景點（可多選）<span class="fold-arrow" style="margin-left:auto;font-size:10px;color:var(--muted)">▼</span>
        </div>
        <div class="tour-pills" style="gap:6px;flex-wrap:wrap">${spotChips}</div>
      </div>
      <button class="tclear-btn" onclick="clearTourFilters()">✕ 清除篩選</button>
    </div>
    <div class="tour-rbar">
      <span class="rtxt">搜尋結果</span>
      <span class="tour-rcnt">${filtered.length} 筆</span>
    </div>
    <div class="clist">${cardsHTML}</div>
    <div class="footer">
      軟糖媽咪Ivy的旅遊筆記 | travel.wunaitw.com<br>
      行程資料來源：各旅行社官方網站<br>
      價格以官網當日為準，僅供參考
    </div>`;

  // 初始化quiz
  if(quizOpen){
    renderQuizSteps();
    // 隱藏結果列表
    const rbar = document.querySelector('.tour-rbar');
    const clist = document.querySelector('.clist');
    if(rbar) rbar.style.display = 'none';
    if(clist) clist.style.display = 'none';
  } else {
    const rbar = document.querySelector('.tour-rbar');
    const clist = document.querySelector('.clist');
    if(rbar) rbar.style.display = '';
    if(clist) clist.style.display = '';
  }
}

// 讀取網址 hash 決定初始 tab
const initHash = location.hash.replace('#','');
if(['tickets','tours','saved','info'].includes(initHash)){
  tab = initHash;
}

render();
</script>
</body>
</html>
